name: Odswiez licznik filmow YouTube

# Raz w tygodniu (poniedzialek rano) strona sama przelicza,
# ile filmow jest na playliscie z poradnikami, i zapisuje wynik do assets/yt.json.
on:
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Policz filmy na playliscie
        run: |
          PLAYLIST=$(python3 -c "import json;print(json.load(open('assets/yt.json'))['playlist'])")
          curl -sL -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            "https://www.youtube.com/playlist?list=$PLAYLIST" -o pl.html
          COUNT=$(grep -oE '"videoId":"[A-Za-z0-9_-]{11}"' pl.html | sort -u | wc -l)
          echo "Znaleziono filmow: $COUNT"
          rm -f pl.html
          if [ "$COUNT" -lt 1 ]; then
            echo "Brak wyniku - zostawiam poprzednia liczbe."
            exit 0
          fi
          python3 -c "import json,datetime,sys; p='assets/yt.json'; d=json.load(open(p)); d['count']=int(sys.argv[1]); d['updated']=datetime.date.today().isoformat(); json.dump(d, open(p,'w'), ensure_ascii=False, indent=2)" "$COUNT"

      - name: Zapisz zmiane
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/yt.json
          git diff --staged --quiet || git commit -m "Aktualizacja licznika filmow YouTube"
          git push
